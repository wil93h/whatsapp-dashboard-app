version: "3.9"

services:
  backend:
    build: ../backend
    container_name: backend_app
    ports:
      - "8000:8000"
    volumes:
      - ../backend:/app
    depends_on:
      - mongo
    restart: always

  mongo:
    image: mongo:7
    container_name: mongo_db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: always

  frontend:
    build: ../frontend
    ports:
      - "5173:5173"
    volumes:
      - ../frontend:/app
    command: npm run dev -- --host
    environment:
      - VITE_API_URL=http://backend:8000
    depends_on:
      - backend
      
volumes:
  mongo_data: